## Naming convetion
# - target: <golden_signal>-<target_type>-<metric>
# Where:
#   - <golden_signal> is one of:
#     - lat - Latency
#     - err - Errors
#     - sat - Saturation
#     - trf - Traffic
- name: lat_eks_service_requests_apm
  comparison_operator: GreaterThanOrEqualToThreshold
  evaluation_periods: 1
  default_threshold: 100
  datapoints_to_alarm: 1
  metric_query:
    latency_e1:
      label: 'Latency ${try(group.percentile, "p99")}'
      return_data: true
      metric:
        metric_name: Latency
        namespace: ApplicationSignals
        statistic: '${try(group.percentile, "p99")}'
        period: 60
      dimensions:
        Environment: "eks:${group.cluster_name}/${group.namespace}"
        Service: "${group.service_name}"
  description: |
    Latency threshold for EKS service requests has been breached.
    * Percentile: __${try(group.percentile, "p99")}__
    * Service: __${group.service_name}__
    * Namespace: __${group.namespace}__
    * Cluster: __${group.cluster_name}__
    * Threshold: __${try(monitor.threshold, 100)}__ ms
- name: err_eks_service_requests_apm
  comparison_operator: GreaterThanOrEqualToThreshold
  evaluation_periods: 1
  default_threshold: 20
  datapoints_to_alarm: 1
  metric_query:
    error_rate_e1:
      label: "Error rate PCT"
      expression: "errors_s1 * 100 / volume_s1"
      period: 60
      return_data: true
    errors_s1:
      label: "Errors Sum"
      metric:
        metric_name: Error
        namespace: ApplicationSignals
        statistic: Sum
        period: 60
        dimensions:
          Environment: "eks:${group.cluster_name}/${group.namespace}"
          Service: "${group.service_name}"
    volume_s1:
      label: "Volume Latency Sample Count"
      metric:
        metric_name: Latency
        namespace: ApplicationSignals
        statistic: SampleCount
        period: 60
        dimensions:
          Environment: "eks:${group.cluster_name}/${group.namespace}"
          Service: "${group.service_name}"
  description: |
    Error rate (HTTP 4xx) for EKS service requests has been breached.
    * Service: __${group.service_name}__
    * Namespace: __${group.namespace}__
    * Cluster: __${group.cluster_name}__
    * Threshold: __${try(monitor.threshold, 20)} %__ of requests
