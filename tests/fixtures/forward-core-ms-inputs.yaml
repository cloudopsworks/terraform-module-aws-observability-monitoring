    - name: "sink"
      description: "SLO for Marketplace Sink service"
      type: "operational"
      service_level_indicator:
        comparison: "LessThan"
        eks:
          cluster_name: "eks-forward-main-prod-003-usea1"
          namespace: "sink-prod"
          name: "sink-frontend-helm"
        threshold: 100
        metric_type: "LATENCY"
        operations:
          - "GET /api/sink/v2/grouped"
          - "GET /api/sink/v2/codes"
        period_seconds: 60
        statistic: "p99"
      goal:
        attainment: 99.9
        duration: 1
        duration_unit: "DAY"